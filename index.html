<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silver Rose Pilgrimage 2026 — Knights of Columbus</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafaf8; color: #1a1a1a; }
  #container { max-width: 960px; margin: 0 auto; padding: 1rem; }
  #header { padding: 1rem 0 0.5rem; }
  #header h1 { font-size: 20px; font-weight: 600; margin-bottom: 3px; }
  #header p { font-size: 13px; color: #666; }
  #top-row { display: flex; align-items: center; gap: 12px; padding: 0.75rem 0 0.25rem; }
  #playBtn { padding: 5px 14px; font-size: 13px; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #1a1a1a; }
  #playBtn:hover { background: #f0f0f0; }
  #dateLabel { font-size: 13px; font-weight: 600; min-width: 80px; }
  #slider-wrap { position: relative; padding: 0 0 30px; }
  #slider { width: 100%; margin: 0; display: block; accent-color: #555; }
  #tick-svg { position: absolute; bottom: 0; left: 0; right: 0; width: 100%; height: 30px; pointer-events: none; overflow: visible; }
  #map-wrap { position: relative; border: 1px solid #e8e8e4; border-radius: 10px; overflow: hidden; background: #f8f8f6; }
  #mapSvg { width: 100%; display: block; }
  #legend { display: flex; flex-wrap: wrap; gap: 4px 10px; padding: 0.5rem 0 0.25rem; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; cursor: pointer; user-select: none; padding: 3px 7px; border-radius: 5px; }
  .leg-item:hover { background: #efefed; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .leg-item.inactive { opacity: 0.3; }
  #selectAll { font-size: 12px; cursor: pointer; padding: 3px 10px; border-radius: 5px; border: 1px solid #ccc; background: #fff; color: #555; flex-shrink: 0; margin-right: 4px; }
  #selectAll:hover { background: #f0f0f0; }
  #leg-divider { width: 1px; height: 18px; background: #ddd; margin: 0 4px; }
  #tooltip { position: absolute; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 7px 11px; font-size: 12px; pointer-events: none; display: none; max-width: 190px; z-index: 10; color: #1a1a1a; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  #tooltip strong { display: block; font-weight: 600; margin-bottom: 2px; }
  #footer { margin-top: 1rem; font-size: 11px; color: #999; text-align: center; }
  #footer a { color: #999; }
</style>
</head>
<body>
<div id="container">
  <div id="header">
    <h1>⚜️ Knights of Columbus — Silver Rose Pilgrimage 2026</h1>
    <p>8 roses travel from Canada &amp; the US to the Basilica of Our Lady of Guadalupe in Mexico City. Hover dots for details, click legend to toggle routes.</p>
  </div>
  <div id="top-row">
    <button id="playBtn">▶ Play</button>
    <span id="dateLabel">Feb 14</span>
  </div>
  <div id="slider-wrap">
    <input type="range" id="slider" min="0" max="302" value="0" step="1">
    <svg id="tick-svg"></svg>
  </div>
  <div id="map-wrap">
    <svg id="mapSvg" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="tooltip"></div>
  </div>
  <div id="legend">
    <button id="selectAll">Deselect all</button>
    <div id="leg-divider"></div>
  </div>
  <div id="footer">
    Route data from <a href="https://www.kofc.org/what-we-do/programs/life/silver-rose/" target="_blank">kofc.org</a> — 2026 schedule
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const COLORS = ['#4A7FE0','#D94F4F','#3DAA60','#D48C1A','#8B4FD4','#1AA8B8','#C44E8A','#6A9E28'];
const TOTAL_DAYS = 302;
const START = new Date(2026, 1, 14);

function md(m, d) {
  return Math.round((new Date(2026, m-1, d) - START) / 86400000);
}
function dayToDateStr(d) {
  const dt = new Date(START.getTime() + d * 86400000);
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

const MANUAL = {
  'BritishColumbia': [118, 108],
  'Alberta':         [185, 120],
  'Saskatchewan':    [258, 118],
  'Manitoba':        [322, 118],
  'Ontario':         [458, 138],
  'Newfoundland':    [642, 108],
  'PEI':             [628, 128],
  'NovaScotia':      [622, 140],
  'NewBrunswick':    [606, 150],
  'Mexico':          [300, 460],
  'PuertoRico':      [638, 392],
  'Alaska':          [95,  432],
  'Hawaii':          [185, 452],
};

const routes = [
  { name:'Route 1', color:COLORS[0], stops:[
    {label:'British Columbia', key:'BritishColumbia', s:md(2,14),e:md(3,14)},
    {label:'Alberta',          key:'Alberta',         s:md(3,15),e:md(4,11)},
    {label:'Saskatchewan',     key:'Saskatchewan',    s:md(4,12),e:md(5,16)},
    {label:'Montana',          key:'Montana',         s:md(5,17),e:md(6,6)},
    {label:'Wyoming',          key:'Wyoming',         s:md(6,7), e:md(6,27)},
    {label:'Utah',             key:'Utah',            s:md(6,28),e:md(7,25)},
    {label:'Arizona',          key:'Arizona',         s:md(7,26),e:md(8,22)},
    {label:'New Mexico',       key:'NewMexico',       s:md(8,23),e:md(9,19)},
    {label:'Texas',            key:'Texas',           s:md(9,20),e:md(11,21)},
    {label:'Mexico',           key:'Mexico',          s:md(11,22),e:md(12,12)},
  ]},
  { name:'Route 2', color:COLORS[1], stops:[
    {label:'Manitoba',         key:'Manitoba',        s:md(2,14),e:md(3,14)},
    {label:'North Dakota',     key:'NorthDakota',     s:md(3,15),e:md(4,11)},
    {label:'South Dakota',     key:'SouthDakota',     s:md(4,12),e:md(5,9)},
    {label:'Nebraska',         key:'Nebraska',        s:md(5,10),e:md(6,13)},
    {label:'Colorado',         key:'Colorado',        s:md(6,14),e:md(7,18)},
    {label:'Kansas',           key:'Kansas',          s:md(7,19),e:md(8,22)},
    {label:'Oklahoma',         key:'Oklahoma',        s:md(8,23),e:md(9,19)},
    {label:'Texas',            key:'Texas',           s:md(9,20),e:md(12,8)},
    {label:'Mexico',           key:'Mexico',          s:md(12,9),e:md(12,12)},
  ]},
  { name:'Route 3', color:COLORS[2], stops:[
    {label:'Minnesota',        key:'Minnesota',       s:md(2,14),e:md(3,14)},
    {label:'Wisconsin',        key:'Wisconsin',       s:md(3,15),e:md(4,11)},
    {label:'Iowa',             key:'Iowa',            s:md(4,12),e:md(5,9)},
    {label:'Illinois',         key:'Illinois',        s:md(5,10),e:md(6,20)},
    {label:'Missouri',         key:'Missouri',        s:md(6,21),e:md(7,18)},
    {label:'Arkansas',         key:'Arkansas',        s:md(7,19),e:md(8,22)},
    {label:'Texas',            key:'Texas',           s:md(8,23),e:md(12,8)},
    {label:'Mexico',           key:'Mexico',          s:md(12,9),e:md(12,12)},
  ]},
  { name:'Route 4', color:COLORS[3], stops:[
    {label:'Ontario',          key:'Ontario',         s:md(2,14),e:md(3,14)},
    {label:'Michigan',         key:'Michigan',        s:md(3,15),e:md(4,18)},
    {label:'Indiana',          key:'Indiana',         s:md(4,19),e:md(5,16)},
    {label:'Kentucky',         key:'Kentucky',        s:md(5,17),e:md(6,13)},
    {label:'Ohio',             key:'Ohio',            s:md(6,14),e:md(7,11)},
    {label:'West Virginia',    key:'WestVirginia',    s:md(7,12),e:md(8,8)},
    {label:'Pennsylvania',     key:'Pennsylvania',    s:md(8,9), e:md(9,12)},
    {label:'New Jersey',       key:'NewJersey',       s:md(9,13),e:md(10,10)},
    {label:'Delaware',         key:'Delaware',        s:md(10,11),e:md(10,31)},
    {label:'Maryland',         key:'Maryland',        s:md(11,1),e:md(11,14)},
    {label:'Washington DC',    key:'DC',              s:md(11,15),e:md(11,28)},
    {label:'Texas',            key:'Texas',           s:md(11,29),e:md(12,8)},
    {label:'Mexico',           key:'Mexico',          s:md(12,9),e:md(12,12)},
  ]},
  { name:'Route 5', color:COLORS[4], stops:[
    {label:'Florida',          key:'Florida',         s:md(2,14),e:md(3,14)},
    {label:'Georgia',          key:'Georgia',         s:md(3,15),e:md(4,18)},
    {label:'South Carolina',   key:'SouthCarolina',   s:md(4,19),e:md(5,16)},
    {label:'North Carolina',   key:'NorthCarolina',   s:md(5,17),e:md(6,13)},
    {label:'Virginia',         key:'Virginia',        s:md(6,14),e:md(7,11)},
    {label:'Tennessee',        key:'Tennessee',       s:md(7,12),e:md(8,22)},
    {label:'Alabama',          key:'Alabama',         s:md(8,23),e:md(9,20)},
    {label:'Mississippi',      key:'Mississippi',     s:md(9,21),e:md(10,10)},
    {label:'Louisiana',        key:'Louisiana',       s:md(10,11),e:md(11,7)},
    {label:'Texas',            key:'Texas',           s:md(11,8),e:md(12,8)},
    {label:'Mexico',           key:'Mexico',          s:md(12,9),e:md(12,12)},
  ]},
  { name:'Route 6', color:COLORS[5], stops:[
    {label:'Newfoundland & Lab.',key:'Newfoundland',  s:md(2,14),e:md(3,7)},
    {label:'Prince Edward Is.', key:'PEI',            s:md(3,8), e:md(3,28)},
    {label:'Nova Scotia',       key:'NovaScotia',     s:md(3,29),e:md(4,18)},
    {label:'New Brunswick',     key:'NewBrunswick',   s:md(4,19),e:md(5,9)},
    {label:'Maine',             key:'Maine',          s:md(5,10),e:md(5,30)},
    {label:'New Hampshire',     key:'NewHampshire',   s:md(5,31),e:md(6,27)},
    {label:'Vermont',           key:'Vermont',        s:md(6,28),e:md(7,18)},
    {label:'New York',          key:'NewYork',        s:md(7,19),e:md(8,22)},
    {label:'Massachusetts',     key:'Massachusetts',  s:md(8,23),e:md(9,26)},
    {label:'Rhode Island',      key:'RhodeIsland',    s:md(9,27),e:md(10,24)},
    {label:'Connecticut',       key:'Connecticut',    s:md(10,25),e:md(11,21)},
    {label:'Texas',             key:'Texas',          s:md(11,22),e:md(12,8)},
    {label:'Mexico',            key:'Mexico',         s:md(12,9),e:md(12,12)},
  ]},
  { name:'Route 7', color:COLORS[6], stops:[
    {label:'Alaska',            key:'Alaska',         s:md(2,14),e:md(3,21)},
    {label:'Hawaii',            key:'Hawaii',         s:md(3,22),e:md(4,18)},
    {label:'Washington',        key:'Washington',     s:md(4,19),e:md(5,23)},
    {label:'Idaho',             key:'Idaho',          s:md(5,24),e:md(6,20)},
    {label:'Oregon',            key:'Oregon',         s:md(6,21),e:md(7,18)},
    {label:'Nevada',            key:'Nevada',         s:md(7,19),e:md(8,15)},
    {label:'California',        key:'California',     s:md(8,16),e:md(10,31)},
    {label:'Arizona',           key:'Arizona',        s:md(11,1),e:md(11,21)},
    {label:'New Mexico',        key:'NewMexico',      s:md(11,22),e:md(12,5)},
    {label:'Texas',             key:'Texas',          s:md(12,6),e:md(12,8)},
    {label:'Mexico',            key:'Mexico',         s:md(12,9),e:md(12,12)},
  ]},
  { name:'Route 8', color:COLORS[7], stops:[
    {label:'Puerto Rico',       key:'PuertoRico',     s:md(3,15),e:md(4,19)},
    {label:'Texas',             key:'Texas',          s:md(4,20),e:md(7,12)},
    {label:'Mexico',            key:'Mexico',         s:md(7,13),e:md(12,12)},
  ]},
];

const mapSvg = d3.select('#mapSvg');
const proj = d3.geoAlbersUsa().scale(950).translate([450, 260]);
const pathGen = d3.geoPath(proj);

let activeRoutes = new Set(routes.map((_,i)=>i));
let allSelected = true;
let currentDay = 0;
let playing = false;
let animTimer = null;

const stateName = {
  '01':'Alabama','02':'Alaska','04':'Arizona','05':'Arkansas','06':'California',
  '08':'Colorado','09':'Connecticut','10':'Delaware','11':'DC','12':'Florida',
  '13':'Georgia','15':'Hawaii','16':'Idaho','17':'Illinois','18':'Indiana',
  '19':'Iowa','20':'Kansas','21':'Kentucky','22':'Louisiana','23':'Maine',
  '24':'Maryland','25':'Massachusetts','26':'Michigan','27':'Minnesota',
  '28':'Mississippi','29':'Missouri','30':'Montana','31':'Nebraska','32':'Nevada',
  '33':'NewHampshire','34':'NewJersey','35':'NewMexico','36':'NewYork',
  '37':'NorthCarolina','38':'NorthDakota','39':'Ohio','40':'Oklahoma',
  '41':'Oregon','42':'Pennsylvania','44':'RhodeIsland','45':'SouthCarolina',
  '46':'SouthDakota','47':'Tennessee','48':'Texas','49':'Utah','50':'Vermont',
  '51':'Virginia','53':'Washington','54':'WestVirginia','55':'Wisconsin','56':'Wyoming'
};

const SC = {...MANUAL};
const tip = document.getElementById('tooltip');

function showTip(event, stop, route) {
  const rect = document.getElementById('map-wrap').getBoundingClientRect();
  tip.style.display = 'block';
  tip.style.left = (event.clientX - rect.left + 12) + 'px';
  tip.style.top  = (event.clientY - rect.top  - 52) + 'px';
  tip.innerHTML  = `<strong>${stop.label}</strong>${route.name}<br>${dayToDateStr(stop.s)} – ${dayToDateStr(stop.e)}`;
}
function hideTip() { tip.style.display = 'none'; }

Promise.all([
  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json'),
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
]).then(([us, world]) => {

  mapSvg.append('g').selectAll('path')
    .data(topojson.feature(world, world.objects.countries).features.filter(d=>+d.id===124||+d.id===484))
    .join('path').attr('d',pathGen)
    .attr('fill','#e6e6e2').attr('stroke','#c5c5be').attr('stroke-width',0.5);

  const stateFeatures = topojson.feature(us, us.objects.states).features;
  mapSvg.append('g').selectAll('path')
    .data(stateFeatures).join('path').attr('d',pathGen)
    .attr('fill','#f2f1ed').attr('stroke','#ccc').attr('stroke-width',0.4);

  mapSvg.append('path')
    .datum(topojson.mesh(us, us.objects.states,(a,b)=>a!==b))
    .attr('d',pathGen).attr('fill','none').attr('stroke','#bbb').attr('stroke-width',0.3);

  stateFeatures.forEach(f => {
    const fips = String(f.id).padStart(2,'0');
    const key = stateName[fips];
    if (!key) return;
    const c = pathGen.centroid(f);
    if (c && !isNaN(c[0])) SC[key] = [Math.round(c[0]), Math.round(c[1])];
  });

  routes.forEach(r => r.stops.forEach(s => {
    const c = SC[s.key];
    s.cx = c ? c[0] : 450;
    s.cy = c ? c[1] : 280;
  }));

  drawLines();
  drawDots();
  drawRoses();
  buildLegend();
  buildTicks();
  update(0);
});

function drawLines() {
  routes.forEach((route, ri) => {
    const g = mapSvg.append('g');
    for (let i = 0; i < route.stops.length-1; i++) {
      const a = route.stops[i], b = route.stops[i+1];
      g.append('line').attr('class',`seg-${ri}-${i}`)
        .attr('x1',a.cx).attr('y1',a.cy).attr('x2',b.cx).attr('y2',b.cy)
        .attr('stroke',route.color).attr('stroke-width',1.5)
        .attr('stroke-dasharray','4 3').attr('opacity',0.12);
    }
  });
}

function drawDots() {
  routes.forEach((route, ri) => {
    const g = mapSvg.append('g');
    route.stops.forEach((stop, si) => {
      g.append('circle').attr('class',`dot-${ri}-${si}`)
        .attr('cx',stop.cx).attr('cy',stop.cy).attr('r',5)
        .attr('fill',route.color).attr('stroke','#fff').attr('stroke-width',1)
        .attr('opacity',0.1).style('cursor','pointer')
        .on('mouseover', (event) => showTip(event, stop, route))
        .on('mouseout',  hideTip);
    });
  });
}

function drawRoses() {
  routes.forEach((route, ri) => {
    mapSvg.append('circle').attr('class',`rose-${ri}`)
      .attr('r',7).attr('fill',route.color)
      .attr('stroke','#fff').attr('stroke-width',2)
      .attr('opacity',0).attr('cx',-50).attr('cy',-50)
      .style('pointer-events','none');
  });
}

function buildLegend() {
  const leg = document.getElementById('legend');
  routes.forEach((r, ri) => {
    const item = document.createElement('div');
    item.className = 'leg-item';
    item.dataset.ri = ri;
    item.innerHTML = `<span class="leg-dot" style="background:${r.color}"></span>${r.name}`;
    item.addEventListener('click', () => {
      if (activeRoutes.has(ri)) { activeRoutes.delete(ri); item.classList.add('inactive'); }
      else { activeRoutes.add(ri); item.classList.remove('inactive'); }
      allSelected = activeRoutes.size === routes.length;
      document.getElementById('selectAll').textContent = allSelected ? 'Deselect all' : 'Select all';
      update(currentDay);
    });
    leg.appendChild(item);
  });
}

document.getElementById('selectAll').addEventListener('click', () => {
  const items = document.querySelectorAll('.leg-item');
  if (allSelected) {
    activeRoutes.clear();
    items.forEach(el => el.classList.add('inactive'));
    document.getElementById('selectAll').textContent = 'Select all';
    allSelected = false;
  } else {
    routes.forEach((_,i) => activeRoutes.add(i));
    items.forEach(el => el.classList.remove('inactive'));
    document.getElementById('selectAll').textContent = 'Deselect all';
    allSelected = true;
  }
  update(currentDay);
});

function buildTicks() {
  requestAnimationFrame(() => {
    const sliderEl = document.getElementById('slider');
    const tickSvg  = document.getElementById('tick-svg');
    const W = sliderEl.getBoundingClientRect().width;
    if (!W) return;
    const thumbInset = 8;
    const trackW = W - thumbInset * 2;
    function dayToX(day) { return thumbInset + (day / TOTAL_DAYS) * trackW; }

    tickSvg.setAttribute('viewBox', `0 0 ${W} 30`);
    tickSvg.setAttribute('width', W);
    tickSvg.setAttribute('height', '30');

    const majorTicks = [
      {day:md(2,14),label:'Feb 14'},{day:md(3,1),label:'Mar'},
      {day:md(4,1),label:'Apr'},{day:md(5,1),label:'May'},
      {day:md(6,1),label:'Jun'},{day:md(7,1),label:'Jul'},
      {day:md(8,1),label:'Aug'},{day:md(9,1),label:'Sep'},
      {day:md(10,1),label:'Oct'},{day:md(11,1),label:'Nov'},
      {day:md(12,1),label:'Dec'},{day:md(12,12),label:'Dec 12'},
    ];

    majorTicks.forEach(({day, label}) => {
      const x = dayToX(day);
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',x); line.setAttribute('x2',x);
      line.setAttribute('y1',0); line.setAttribute('y2',9);
      line.setAttribute('stroke','#888'); line.setAttribute('stroke-width','1.2');
      tickSvg.appendChild(line);
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',x); txt.setAttribute('y',22);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('font-size','9.5');
      txt.setAttribute('font-family','-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif');
      txt.setAttribute('fill','#666');
      txt.textContent = label;
      tickSvg.appendChild(txt);
    });

    const majorDays = new Set(majorTicks.map(t=>t.day));
    for (let mo = 2; mo <= 12; mo++) {
      [1,8,15,22].forEach(dy => {
        const day = md(mo, dy);
        if (day < 0 || day > TOTAL_DAYS) return;
        if (majorDays.has(day)) return;
        let tooClose = false;
        majorDays.forEach(m2 => { if (Math.abs(day-m2) < 4) tooClose = true; });
        if (tooClose) return;
        const x = dayToX(day);
        const t = document.createElementNS('http://www.w3.org/2000/svg','line');
        t.setAttribute('x1',x); t.setAttribute('x2',x);
        t.setAttribute('y1',0); t.setAttribute('y2',5);
        t.setAttribute('stroke','#bbb'); t.setAttribute('stroke-width','0.8');
        tickSvg.appendChild(t);
      });
    }
  });
}

function update(day) {
  currentDay = day;
  document.getElementById('dateLabel').textContent = dayToDateStr(day);
  document.getElementById('slider').value = day;

  routes.forEach((route, ri) => {
    const isActive = activeRoutes.has(ri);
    let currentStop = null;
    route.stops.forEach((stop, si) => {
      const visited = isActive && day >= stop.s;
      const current = visited && day <= stop.e;
      d3.select(`.dot-${ri}-${si}`)
        .attr('opacity', visited ? (current ? 1 : 0.28) : 0.08)
        .attr('r', current ? 6 : 5);
      if (current) currentStop = stop;
    });
    for (let i = 0; i < route.stops.length-1; i++) {
      d3.select(`.seg-${ri}-${i}`)
        .attr('opacity', isActive && day >= route.stops[i+1].s ? 0.5 : 0.08);
    }
    if (currentStop && isActive) {
      d3.select(`.rose-${ri}`).attr('cx',currentStop.cx).attr('cy',currentStop.cy).attr('opacity',1);
    } else {
      d3.select(`.rose-${ri}`).attr('opacity',0);
    }
  });
}

document.getElementById('slider').addEventListener('input', e => update(+e.target.value));

const playBtn = document.getElementById('playBtn');
playBtn.addEventListener('click', () => {
  if (playing) {
    clearInterval(animTimer); playing=false; playBtn.textContent='▶ Play';
  } else {
    if (currentDay >= TOTAL_DAYS) update(0);
    playing=true; playBtn.textContent='⏸ Pause';
    animTimer = setInterval(() => {
      if (currentDay >= TOTAL_DAYS) {
        clearInterval(animTimer); playing=false; playBtn.textContent='▶ Play'; return;
      }
      update(currentDay+1);
    }, 28);
  }
});
</script>
</body>
